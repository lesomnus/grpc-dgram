name: CI

on:
  pull_request:
    paths: &paths
      - "**/*.go"
      - ".github/workflows/ci.yaml"
      - "go.mod"
      - "go.sum"
  push:
    paths: *paths

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -timeout 10s -bench='^$' ./...

      - name: Lookup last successful commit
        id: last-success
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WF_REF="${{ github.workflow_ref }}"
          FILENAME=$(basename "${WF_REF%%@*}")
          gh run list \
            --workflow=$FILENAME \
            --status=success \
            --limit=1 \
            --json headSha \
            --jq '.[0].headSha' > sha

          SHA="$(tr -d '\n' < sha)"
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid commit hash from gh run list: '$SHA'" >&2
            exit 1
          fi

          echo "LAST_SUCCESS=$SHA" >> $GITHUB_ENV

      - name: Checkout last successful commit
        if: steps.last-success.outcome == 'success'
        uses: actions/checkout@v6
        with:
          ref: ${{ env.LAST_SUCCESS }}
          path: old

      - name: Run benchmark on last successful commit
        if: steps.last-success.outcome == 'success'
        run: |
          cd old
          go mod download
          go test -bench=. -benchmem -count=10 -run='^$' . > "../old-${LAST_SUCCESS}.txt"

      - name: Run benchmark on current
        if: steps.last-success.outcome == 'success'
        run: |
          go test -bench=. -benchmem -count=10 -run='^$' . > "new-${GITHUB_SHA}.txt"

      - name: Install benchstat
        if: steps.last-success.outcome == 'success'
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare
        if: steps.last-success.outcome == 'success'
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          benchstat \
            "old-${LAST_SUCCESS}.txt" \
            "new-${GITHUB_SHA}.txt" \
            | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
