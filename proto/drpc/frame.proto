edition = "2023";

package drpc;

import "drpc/metadata.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/lesomnus/grpc-dgram;drpc";

message Frame {
  fixed32 sid = 1;
  fixed32 seq = 2;
  // bytes nonce = 3;

  // Method is mapped to numeric index at the server.
  // Server always respond only with `method_index` so the client can learn which
  // service is mapped to what number during communication.
  string method = 4;
  uint32 method_index = 5;
  // uint32 flags = 6;

  google.protobuf.Timestamp deadline = 7;

  bytes payload = 8;

  // Status code and error description.
  // See https://grpc.io/docs/guides/status-codes/.
  uint32 code = 9;
  string desc = 10;

  Metadata metadata = 11;
}
